<label
  class="relative inline-flex shrink-0 cursor-pointer"
  [class.cursor-not-allowed]="disabled"
  [class.opacity-50]="disabled"
  [attr.aria-label]="ariaLabel || null"
>
  <input
    type="checkbox"
    class="peer sr-only"
    [checked]="checked"
    [disabled]="disabled"
    (change)="onToggle($event)"
  />
  <span
    class="block h-5 w-9 rounded-full bg-gray-200 transition-colors peer-checked:bg-primary peer-disabled:cursor-not-allowed peer-disabled:opacity-50"
  ></span>
  <span
    class="absolute left-0.5 top-0.5 size-4 rounded-full bg-white shadow-sm ring-0 transition-transform peer-checked:translate-x-4"
  ></span>
</label>
