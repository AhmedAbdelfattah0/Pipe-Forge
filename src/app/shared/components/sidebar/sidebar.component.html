<aside class="flex h-screen w-60 flex-shrink-0 flex-col bg-navy text-white">

  <!-- Logo -->
  <div class="flex h-16 items-center gap-3 px-4">
    <div class="flex h-8 w-8 items-center justify-center rounded-lg bg-primary">
      <lucide-icon [img]="zapIcon" [size]="18" class="text-white" />
    </div>
    <span class="font-display text-xl font-bold">PipeForge</span>
  </div>

  <!-- Navigation -->
  <nav aria-label="App navigation" class="flex-1 space-y-1 px-3 py-4">
    @for (item of navItems; track item.route) {
      <a
        [routerLink]="item.route"
        [class]="isActive(item.route) ? activeItemClass : inactiveItemClass"
        (click)="linkClicked.emit()"
      >
        <lucide-icon [img]="item.icon" [size]="20" class="shrink-0" />
        {{ item.label }}
      </a>
    }
  </nav>

  <!-- Logout -->
  <div class="border-t border-white/10 p-3">
    <button
      type="button"
      class="flex w-full items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium text-white/70 transition-colors hover:bg-white/10 hover:text-white outline-none focus-visible:ring-2 focus-visible:ring-white/50 focus-visible:ring-offset-2 focus-visible:ring-offset-navy"
      (click)="logoutClicked.emit()"
    >
      <lucide-icon [img]="logOutIcon" [size]="20" class="shrink-0" />
      Logout
    </button>
  </div>

</aside>
