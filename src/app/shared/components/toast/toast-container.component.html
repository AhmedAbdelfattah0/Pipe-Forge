<!-- Fixed top-right toast stack -->
<div
  class="pointer-events-none fixed top-4 right-4 z-50 flex flex-col gap-3"
  aria-live="polite"
  aria-label="Notifications"
  role="region"
>
  @for (toast of toastService.toasts(); track toast.id) {
    <div
      [class]="containerClass(toast.type)"
      role="alert"
      style="animation: slideInRight 0.25s ease-out"
    >
      <!-- Icon -->
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        [class]="iconClass(toast.type)"
        aria-hidden="true"
      >
        <path [attr.d]="iconPath(toast.type)" />
      </svg>

      <!-- Message -->
      <p [class]="messageClass(toast.type)">{{ toast.message }}</p>

      <!-- Dismiss button -->
      <button
        type="button"
        [class]="dismissClass(toast.type)"
        (click)="toastService.dismiss(toast.id)"
        aria-label="Dismiss notification"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
    </div>
  }
</div>
