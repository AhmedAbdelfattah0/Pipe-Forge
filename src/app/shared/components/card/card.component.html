<div class="min-w-0 rounded border border-border bg-card shadow-sm">
  @if (title || subtitle) {
    <div class="border-b border-border px-6 py-4">
      @if (title) {
        <h3 class="min-w-0 text-sm font-semibold text-navy">{{ title }}</h3>
      }
      @if (subtitle) {
        <p class="mt-1 min-w-0 text-sm text-navy/50">{{ subtitle }}</p>
      }
    </div>
  }

  <div [class]="paddingClass">
    <ng-content />
  </div>
</div>
