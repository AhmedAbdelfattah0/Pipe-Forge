<pf-card title="Step 4 — Build Type">

  <div class="mb-6">
    <p class="mb-2 text-sm font-medium text-text-dark">Build Type</p>
    <div class="space-y-2">
      @for (bt of buildTypes; track bt.id) {
        <button type="button" (click)="selectBuildType(bt.id)"
          [class]="state.buildConfig().buildType === bt.id
            ? 'w-full rounded-lg border-2 border-primary bg-primary/10 px-4 py-3 text-left'
            : 'w-full rounded-lg border-2 border-border bg-card px-4 py-3 text-left hover:border-primary/50'">
          <p [class]="state.buildConfig().buildType === bt.id ? 'text-sm font-semibold text-primary' : 'text-sm font-semibold text-text-dark'">{{ bt.label }}</p>
          <p class="text-xs text-text-dark/60">{{ bt.desc }}</p>
        </button>
      }
    </div>
  </div>

  <div>
    <p class="mb-2 text-sm font-medium text-text-dark">Build Number Strategy</p>
    <div class="flex gap-2">
      @for (s of numberStrategies; track s.id) {
        <button type="button" (click)="selectStrategy(s.id)"
          [class]="state.buildConfig().buildNumberStrategy === s.id
            ? 'flex-1 rounded-lg border-2 border-primary bg-primary/10 py-2 text-xs font-medium text-primary'
            : 'flex-1 rounded-lg border-2 border-border bg-card py-2 text-xs font-medium text-text-dark hover:border-primary/50'">
          {{ s.label }}
        </button>
      }
    </div>
  </div>

  <div class="mt-6 flex justify-between">
    <pf-button variant="ghost" (click)="state.prevStep()">Back</pf-button>
    <pf-button variant="primary" (click)="state.nextStep()">Next: Distribution</pf-button>
  </div>
</pf-card>
