<!-- Admin Layout -->
<div class="flex h-screen overflow-hidden bg-surface font-sans">

  <!-- ── Mobile overlay ───────────────────────────────────────────────────────── -->
  @if (sidebarOpen()) {
    <div
      class="fixed inset-0 z-20 bg-black/60 lg:hidden"
      (click)="closeSidebar()"
      aria-hidden="true"
    ></div>
  }

  <!-- ── Sidebar ───────────────────────────────────────────────────────────────── -->
  <aside
    class="fixed inset-y-0 left-0 z-30 flex w-64 flex-col bg-navy transition-transform duration-300 lg:relative lg:translate-x-0"
    [class.-translate-x-full]="!sidebarOpen()"
    [class.translate-x-0]="sidebarOpen()"
  >
    <!-- Logo -->
    <div class="flex h-16 shrink-0 items-center gap-2 border-b border-white/10 px-5">
      <lucide-icon [img]="zapIcon" [size]="22" class="text-primary" />
      <span class="text-base font-bold text-white">PipeForge</span>
      <span class="ml-1 rounded bg-primary/20 px-1.5 py-0.5 text-[10px] font-semibold uppercase tracking-wide text-primary">
        Admin
      </span>
    </div>

    <!-- Nav items -->
    <nav class="flex-1 space-y-0.5 overflow-y-auto px-3 py-4">
      @for (item of navItems; track item.route) {
        <a
          [routerLink]="item.route"
          [routerLinkActiveOptions]="{ exact: item.route === '/admin' }"
          routerLinkActive="bg-primary/20 border-l-4 border-primary text-white"
          class="group flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium text-white/70 transition-colors hover:bg-white/10 hover:text-white"
          (click)="closeSidebar()"
        >
          <lucide-icon [img]="item.icon" [size]="17" />
          <span>{{ item.label }}</span>
          @if (item.showBadge && pendingFeedback > 0) {
            <span class="ml-auto flex h-5 min-w-5 items-center justify-center rounded-full bg-red-500 px-1 text-[10px] font-bold text-white">
              {{ pendingFeedback > 99 ? '99+' : pendingFeedback }}
            </span>
          }
        </a>
      }
    </nav>

    <!-- Back to app -->
    <div class="shrink-0 border-t border-white/10 p-3">
      <a
        routerLink="/generator"
        class="flex items-center gap-2 rounded-lg px-3 py-2.5 text-sm font-medium text-white/60 transition-colors hover:bg-white/10 hover:text-white"
      >
        <lucide-icon [img]="arrowLeftIcon" [size]="16" />
        Back to App
      </a>
    </div>
  </aside>

  <!-- ── Main content ──────────────────────────────────────────────────────────── -->
  <div class="flex flex-1 flex-col overflow-hidden">

    <!-- Top bar -->
    <header class="flex h-16 shrink-0 items-center justify-between border-b border-border bg-card px-4 lg:px-6">
      <div class="flex items-center gap-3">
        <!-- Mobile menu toggle -->
        <button
          type="button"
          class="rounded-lg p-2 text-text-dark/60 transition-colors hover:bg-surface lg:hidden"
          (click)="toggleSidebar()"
          aria-label="Toggle admin menu"
        >
          @if (sidebarOpen()) {
            <lucide-icon [img]="xIcon" [size]="20" />
          } @else {
            <lucide-icon [img]="menuIcon" [size]="20" />
          }
        </button>

        <div class="flex items-center gap-2">
          <lucide-icon [img]="shieldCheckIcon" [size]="18" class="text-primary" />
          <span class="text-base font-semibold text-text-dark">Admin Panel</span>
        </div>
      </div>

      <a
        routerLink="/generator"
        class="flex items-center gap-1.5 rounded-lg border border-border px-3 py-1.5 text-sm font-medium text-text-dark/70 transition-colors hover:bg-surface hover:text-text-dark"
      >
        <lucide-icon [img]="arrowLeftIcon" [size]="14" />
        Back to App
      </a>
    </header>

    <!-- Page content -->
    <main class="flex-1 overflow-y-auto p-4 lg:p-6">
      <router-outlet />
    </main>
  </div>
</div>
