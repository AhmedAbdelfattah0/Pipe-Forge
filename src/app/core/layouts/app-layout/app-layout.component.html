<div class="flex h-screen overflow-hidden">

  <!-- Desktop sidebar (hidden on mobile) -->
  <div class="hidden lg:block">
    <pf-sidebar (logoutClicked)="onLogout()" />
  </div>

  <!-- Mobile sidebar overlay (always in DOM for CSS transitions) -->
  <!-- Backdrop -->
  <div
    class="fixed inset-0 z-40 bg-black/50 transition-opacity duration-200 lg:hidden"
    [class.opacity-0]="!sidebarOpen()"
    [class.pointer-events-none]="!sidebarOpen()"
    (click)="closeSidebar()"
    aria-hidden="true"
  ></div>

  <!-- Slide-out sidebar -->
  <div
    class="fixed inset-y-0 left-0 z-50 w-60 transition-transform duration-200 ease-out lg:hidden"
    [class.-translate-x-full]="!sidebarOpen()"
    [class.translate-x-0]="sidebarOpen()"
  >
    <pf-sidebar (logoutClicked)="onLogout()" (linkClicked)="closeSidebar()" />
  </div>

  <!-- Main content area -->
  <div class="flex flex-1 flex-col overflow-hidden">

    <!-- Mobile header (hidden on desktop) -->
    <header class="flex h-14 items-center justify-between border-b border-border bg-card px-4 lg:hidden">
      <button
        type="button"
        (click)="toggleSidebar()"
        class="flex h-9 w-9 items-center justify-center rounded-lg text-navy transition-colors hover:bg-surface outline-none focus-visible:ring-2 focus-visible:ring-primary/50"
        [attr.aria-expanded]="sidebarOpen()"
        aria-label="Toggle navigation menu"
      >
        <lucide-icon [img]="sidebarOpen() ? xIcon : menuIcon" [size]="20" />
      </button>

      <a routerLink="/">
        <svg width="160" height="28" viewBox="0 0 220 36" fill="none">
          <path d="M0 4 L10 18 L0 32" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M11 4 L21 18 L11 32" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
          <path d="M22 4 L32 18 L22 32" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.2"/>
          <text font-family="Inter, sans-serif" font-size="22" letter-spacing="-0.3">
            <tspan x="44" y="26" font-weight="400" fill="#0F172A">Pipe</tspan>
            <tspan font-weight="700" fill="#3B82F6">Forge</tspan>
          </text>
        </svg>
      </a>

      <!-- Spacer to center the logo -->
      <div class="w-9"></div>
    </header>

    <!-- Page content -->
    <main class="flex-1 overflow-auto bg-surface">
      <router-outlet />
    </main>

  </div>

  <!-- Feedback widget -->
  <pf-feedback-widget />
</div>
